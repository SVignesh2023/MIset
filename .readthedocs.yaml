version: 2

# Build configuration
build:
  os: ubuntu-24.04
  tools:
    python: "3.10"

# Python dependencies
python:
  version: 3.10
  install:
    - requirements: requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - docs

# Sphinx configuration
sphinx:
  configuration: src/docs/source/conf.py

# Output directory
formats:
  - pdf
  - epub
  
